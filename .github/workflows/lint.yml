name: lint for py file
on:
  push:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout or clone
        uses: actions/checkout@v4
  install:
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: install linter
        run: pip install ruff
  check:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - name: chekcing the code
        run: ruff check .
